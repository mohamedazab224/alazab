# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main", "master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # enablement: true allows this action to automatically enable GitHub Pages
      # if it is not already enabled in the repository settings.
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Verify that key pages are accessible (HTTP 2xx/3xx) after deployment.
      # This step checks index.html and a selection of other important pages.
      # The workflow fails if any critical page is inaccessible.
      - name: Verify pages are accessible
        run: |
          BASE_URL="${{ steps.deployment.outputs.page_url }}"
          echo "Deployed site URL: $BASE_URL"

          PAGES=(
            "index.html"
            "contact.html"
            "project.html"
            "services/index.html"
          )

          ALL_OK=true
          for PAGE in "${PAGES[@]}"; do
            URL="${BASE_URL}${PAGE}"
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 "$URL" || echo "CURL_ERROR")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
              echo "✅ $URL -> HTTP $STATUS"
            else
              echo "❌ $URL -> HTTP $STATUS  (page may be missing or inaccessible)"
              ALL_OK=false
            fi
          done

          if [ "$ALL_OK" = "false" ]; then
            echo "::error::One or more pages did not return a successful HTTP status. Deployment verification failed."
            exit 1
          else
            echo "All verified pages returned a successful HTTP status."
          fi
